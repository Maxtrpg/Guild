<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>馬茲提卡地理誌 - 互動圖集</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Noto+Serif+TC:wght@400;700&display=swap" rel="stylesheet">

    <style>
        /* --- 全局設定 --- */
        :root { --gold: #d4af37; --text: #e0d0b0; }
        body {
            margin: 0; padding: 0;
            background-color: #050505;
            background-image: url('../assets/env.webp'); 
            background-size: cover; background-position: center; background-attachment: fixed;
            font-family: 'Noto Serif TC', serif; color: #2c1b18;
            overflow: hidden; user-select: none;
        }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(8px); z-index: -1; }

        #book-container {
            position: relative; width: 90vw; height: 90vh; margin: 5vh auto;
            background-image: url('../assets/page_bg.webp');
            background-size: cover; background-position: center;
            box-shadow: 0 0 50px rgba(0,0,0,0.8); border-radius: 5px;
            overflow: hidden; display: flex; flex-direction: column;
        }
        
        #book-container::before {
            content: ""; position: absolute; top: 15px; left: 15px; right: 15px; bottom: 15px;
            border: 2px solid rgba(139, 69, 19, 0.3); pointer-events: none; z-index: 10;
        }

        .page-section { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; opacity: 1; z-index: 1; }

        .book-header {
            height: 60px; padding: 10px 30px; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid rgba(139, 69, 19, 0.2); background: rgba(227, 210, 180, 0.85); z-index: 20;
        }
        .book-title { font-family: 'Cinzel', 'Noto Serif TC', serif; font-size: 1.5rem; color: #5d4037; font-weight: bold; }
        .nav-btn {
            padding: 8px 20px; border: 1px solid #8b4513; background: rgba(255,255,255,0.3); color: #5d4037;
            cursor: pointer; font-family: 'Cinzel', 'Noto Serif TC', serif; transition: all 0.2s; font-weight: bold;
        }
        .nav-btn:hover { background: #5d4037; color: #e3d2b4; }

        .map-viewport { flex: 1; position: relative; overflow: hidden; background: #dccbb0; cursor: grab; }
        .map-viewport:active { cursor: grabbing; }
        .map-image-container { position: absolute; top: 0; left: 0; transform-origin: 0 0; }
        .map-img { display: block; pointer-events: auto; user-select: none; -webkit-user-drag: none; width: 1500px; }
        .hotspot-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; transition: opacity 0.5s; }

        /* --- 不規則 SVG 區域 CSS --- */
        .map-region-polygon {
            cursor: pointer; pointer-events: auto;
            transition: all 0.3s ease;
            stroke-width: 2.5;
            stroke-linejoin: round; 
            stroke-linecap: round;
            vector-effect: non-scaling-stroke; 
        }
        .map-region-polygon:hover {
            stroke-width: 4.5;
            filter: drop-shadow(0 0 15px currentColor) brightness(1.2);
            z-index: 10;
        }
        .map-region-polygon.locked { fill: rgba(30, 30, 30, 0.5) !important; stroke: #555 !important; }
        .map-region-polygon.locked:hover { filter: drop-shadow(0 0 10px rgba(255,0,0,0.8)); fill: rgba(50, 0, 0, 0.6) !important; }

        /* 海域專屬 CSS (無邊線) */
        .map-region-polygon.ocean {
            stroke-width: 0 !important; 
            pointer-events: auto; 
        }
        .map-region-polygon.ocean:hover {
            stroke-width: 0 !important;
            fill: rgba(68, 136, 255, 0.35) !important;
            filter: drop-shadow(0 0 15px rgba(68, 136, 255, 0.6));
        }

        /* 群島專屬 CSS (藍綠色) */
        .map-region-polygon.archipelago {
            fill: rgba(32, 178, 170, 0.4) !important; 
            stroke: #20b2aa !important; 
            color: #20b2aa !important;
            cursor: help; 
            pointer-events: auto; 
        }
        .map-region-polygon.archipelago:hover {
            stroke-width: 3.5;
            filter: drop-shadow(0 0 15px currentColor) brightness(1.3);
            z-index: 5;
        }

        .region-svg-text {
            font-family: 'Cinzel', 'Noto Serif TC', serif;
            font-size: 24px; font-weight: bold;
            text-anchor: middle; dominant-baseline: middle;
            pointer-events: none;
            transition: opacity 0.3s;
            text-shadow: 0 2px 4px rgba(0,0,0,0.9), 0 0 10px currentColor;
        }
        .locked-text { fill: #888 !important; text-shadow: 0 2px 2px #000; }

        /* --- 內部小地標圖釘 --- */
        .map-pin { 
            position: absolute; width: 32px; height: 40px; background-color: transparent; 
            cursor: pointer; transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 10;
            pointer-events: auto; transform-origin: bottom center; transform: translate(-50%, -100%);
            animation: pin-idle 2.5s infinite ease-in-out;
        }
        .map-pin::before {
            content: ''; position: absolute; bottom: -4px; left: 50%; width: 25px; height: 8px; 
            background: rgba(0, 0, 0, 0.4); border-radius: 50%; transform: translateX(-50%);
            z-index: -1; animation: radar-pulse 2s infinite ease-out; pointer-events: none;
        }
        @keyframes pin-idle { 0%, 100% { margin-top: 0; filter: drop-shadow(0 5px 5px rgba(0,0,0,0.5)); } 50% { margin-top: -12px; filter: drop-shadow(0 15px 10px rgba(0,0,0,0.4)); } }
        @keyframes radar-pulse { 0% { transform: translateX(-50%) scale(0.5); opacity: 1; } 100% { transform: translateX(-50%) scale(3.5); opacity: 0; } }
        .map-pin:hover { animation: none; margin-top: 0; transform: translate(-50%, -100%) scale(1.2); filter: drop-shadow(0 0 15px rgba(255, 255, 255, 0.8)); z-index: 100; }
        .map-pin:hover::before { display: none; }
        .map-pin.locked { filter: grayscale(100%) brightness(0.7); animation: none; }
        .map-pin.locked:hover { filter: grayscale(100%) brightness(1) drop-shadow(0 0 10px rgba(255,0,0,0.8)); transform: translate(-50%, -100%) scale(1.1); }
        .map-pin.locked::before { display: none; }

        /* --- 浮動簡介視窗 (Tooltip) --- */
        #hover-tooltip {
            position: fixed; background: rgba(15, 10, 5, 0.95);
            border: 2px solid var(--gold); border-radius: 6px; padding: 15px; width: 280px;
            pointer-events: none; opacity: 0; z-index: 9999;
            box-shadow: 0 10px 30px rgba(0,0,0,0.9); transform: translateY(10px);
            transition: opacity 0.2s, transform 0.2s; color: var(--text);
            overflow: hidden; 
        }
        #hover-tooltip.show { opacity: 1; transform: translateY(0); }

        /* 半透明地點縮圖背景 */
        .tt-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover; background-position: center;
            opacity: 0.35; 
            z-index: 0;
            transition: background-image 0.3s ease;
            mask-image: linear-gradient(to bottom, rgba(0,0,0,1) 20%, rgba(0,0,0,0.05) 100%);
            -webkit-mask-image: linear-gradient(to bottom, rgba(0,0,0,1) 20%, rgba(0,0,0,0.05) 100%);
        }

        .tt-content { position: relative; z-index: 1; }

        .tt-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px dashed rgba(212,175,55,0.4); padding-bottom: 8px; margin-bottom: 10px; }
        .tt-title { font-size: 1.2rem; color: var(--gold); font-weight: bold; font-family: 'Cinzel', 'Noto Serif TC', serif; text-shadow: 0 2px 4px #000; }
        .tt-status { font-size: 0.85rem; font-weight: bold; text-shadow: 0 2px 4px #000; }
        .tt-brief { font-size: 0.95rem; line-height: 1.5; color: #ddd; text-align: justify; text-shadow: 0 1px 3px #000; }
        .tt-tags { display: flex; flex-direction: column; gap: 6px; margin-top: 15px; }
        .tt-tag { padding: 6px 10px; border-radius: 4px; font-size: 0.85rem; font-weight: bold; letter-spacing: 1px; line-height: 1.5; }
        .tt-tag.scenario { background: rgba(212,175,55,0.15); color: #e3d2b4; border-left: 3px solid var(--gold); }
        .tt-tag.team { background: rgba(139, 0, 0, 0.2); color: #ff9999; border-left: 3px solid #8b0000; }

        /* --- 地點詳情彈窗 (Modal) --- */
        #location-modal {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(5px);
            z-index: 10000; display: flex; justify-content: center; align-items: center;
            opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
        }
        #location-modal.show {
            opacity: 1; pointer-events: auto;
        }
        .modal-box {
            width: 85vw; height: 85vh; background: #14100d;
            border: 2px solid var(--gold); border-radius: 6px;
            box-shadow: 0 10px 60px rgba(0,0,0,1); display: flex; flex-direction: column;
            transform: scale(0.95); transition: transform 0.3s ease;
            position: relative; overflow: hidden;
            background-image: url('../assets/page_bg.webp');
            background-size: cover; background-blend-mode: multiply;
        }
        #location-modal.show .modal-box { transform: scale(1); }
        .modal-header {
            height: 50px; background: rgba(15, 12, 10, 0.95); border-bottom: 2px solid var(--gold);
            display: flex; justify-content: space-between; align-items: center; padding: 0 25px;
        }
        .modal-title-text { color: var(--gold); font-family: 'Cinzel', 'Noto Serif TC', serif; font-size: 1.3rem; font-weight: bold; letter-spacing: 2px; }
        .modal-close-btn {
            background: none; border: none; color: #ff5555; font-size: 2rem; cursor: pointer;
            transition: 0.2s; padding: 0; line-height: 1; margin-top: -5px;
        }
        .modal-close-btn:hover { color: #ff0000; transform: scale(1.1); }
        .modal-body { flex: 1; position: relative; width: 100%; height: 100%; }
        .modal-iframe { width: 100%; height: 100%; border: none; background: transparent; display: none; }
        .modal-simple-content { display: none; padding: 50px; color: var(--text); overflow-y: auto; height: 100%; box-sizing: border-box; }
        .modal-simple-content h2 { font-family: 'Cinzel', serif; font-size: 2.5rem; color: #8b0000; border-bottom: 2px solid #5d4037; padding-bottom: 10px; margin-top: 0; }
        .modal-simple-content p { font-size: 1.25rem; line-height: 1.8; text-align: justify; color: #dccbb0; }

        /* --- 區域專專屬自然景點標籤 --- */
        .local-spot-tag {
            position: absolute;
            font-family: 'Noto Serif TC', serif;
            font-size: 0.9rem;
            font-weight: bold;
            text-shadow: 0 0 5px rgba(0,0,0,0.9), 0 0 10px rgba(0,0,0,0.8);
            white-space: nowrap;
            pointer-events: none; 
            z-index: 5;
            transform: translate(-50%, -50%); 
        }

        /* 各種景點地貌顏色 */
        .spot-forest { color: #4ade80; } /* 自然綠字 */
        .spot-river  { color: #38bdf8; } /* 河流藍字 */
        .spot-lake   { color: #7dd3fc; } /* 湖泊淺藍 */
        .spot-sea   { color: #0080FF; } /* 海洋 */
        .spot-plain  { color: #eab308; } /* 其他自然地貌 */
        .spot-mountain { color: #a3a3a3; } /* 山脈灰字 */
        .spot-volcano  { color: #ff5722; } /* 火山橘紅字 */
        .spot-swamp    { color: #A5A552; } /* 沼澤墨綠字 */
        .spot-island    { color: #20b2aa; } /* 島嶼藍綠 */

    </style>
</head>
<body>
    <div class="overlay"></div>

    <div id="location-modal">
        <div class="modal-box">
            <div class="modal-header">
                <div class="modal-title-text" id="modal-title">地點檔案</div>
                <button class="modal-close-btn" onclick="closeModal()">×</button>
            </div>
            <div class="modal-body">
                <iframe id="modal-iframe" class="modal-iframe"></iframe>
                <div id="modal-simple-content" class="modal-simple-content"></div>
            </div>
        </div>
    </div>

    <div id="hover-tooltip">
        <div id="tt-bg" class="tt-bg"></div>
        
        <div class="tt-content">
            <div class="tt-header">
                <span class="tt-title" id="tt-title">地點名稱</span>
                <span class="tt-status" id="tt-status">狀態</span>
            </div>
            <div class="tt-brief" id="tt-brief">簡介內容...</div>
            <div class="tt-tags" id="tt-tags-container">
                <div class="tt-tag scenario" id="tt-scenario">📜 關聯劇本: 無</div>
                <div class="tt-tag team" id="tt-team">🚩 首勘隊伍: 未知</div>
            </div>
        </div>
    </div>

    <div id="book-container">
        <div id="page-map" class="page-section active">
            <header class="book-header">
                <div class="book-title" id="header-title">馬茲提卡大陸全圖</div>
                <button class="nav-btn" id="header-btn" onclick="handleHeaderNavClick()">← 返回公會書房</button>
            </header>
            
            <div class="map-viewport" id="viewport">
                <div class="map-image-container" id="map-container">
                    <img src="../assets/map.webp" class="map-img" id="main-map-img">
                    <div id="layer-world" class="hotspot-layer"></div>
                    <div id="layer-region" class="hotspot-layer" style="opacity: 0; pointer-events: none;"></div>
                </div>

                <div style="position:absolute; bottom:20px; width:100%; text-align:center; pointer-events:none; color:rgba(255,255,255,0.7); text-shadow: 0 2px 4px #000;">
                    滾輪縮放 • 拖曳移動 • 點擊探索
                </div>
            </div>
        </div>
    </div>

        function getAztecPinSVG(mainColor, gemColor) {
            return `<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 120' style="width:100%; height:100%; pointer-events:none;">
                <polygon points='50,115 10,50 50,10 90,50' fill='#1a1511' stroke='${mainColor}' stroke-width='6'/>
                <polygon points='50,25 60,35 75,35 75,50 60,65 50,75 40,65 25,50 25,35 40,35' fill='${gemColor}'/>
                <rect x='42' y='42' width='16' height='16' fill='${mainColor}' transform='rotate(45 50 50)'/>
            </svg>`;
        }

        let globalLayerElement = null;
        let ALL_LOCATIONS = [];
        let ALL_SPOTS = [];

        function compileGlobalData() {
            ALL_LOCATIONS = [];
            ALL_SPOTS = [];
            for (let regionKey in worldData) {
                const region = worldData[regionKey];
                
                if (region.locations) {
                    region.locations.forEach(loc => {
                        ALL_LOCATIONS.push({
                            ...loc,
                            regionKey: regionKey,
                            regionName: region.name
                        });
                    });
                }
                
                if (region.spots) {
                    region.spots.forEach(spot => {
                        ALL_SPOTS.push({
                            ...spot,
                            regionKey: regionKey,
                            regionName: region.name
                        });
                    });
                }
            }
        }

        function attachTooltipEvents(element, data, type = 'location') {
            const tooltip = document.getElementById('hover-tooltip');
            const tagsContainer = document.getElementById('tt-tags-container');
            const statusEl = document.getElementById('tt-status');
            const bgEl = document.getElementById('tt-bg'); 

            element.addEventListener('mouseenter', (e) => {
                document.getElementById('tt-title').innerText = data.name;
                document.getElementById('tt-brief').innerText = data.brief || '此區域尚無詳細情報，等待冒險者探索。';
                
                if (type === 'location' && !data.isLocked && data.url) {
                    const imgSrc = data.url.replace('.html', '.webp');
                    bgEl.style.backgroundImage = `url('locations/${imgSrc}')`;
                } else {
                    bgEl.style.backgroundImage = 'none'; 
                }

                if (type === 'region' || type === 'ocean' || type === 'archipelago' || type === 'spot') {
                    tagsContainer.style.display = 'none';
                    statusEl.style.display = 'none';
                } else {
                    tagsContainer.style.display = 'flex';
                    statusEl.style.display = 'inline';
                    if(data.isLocked) {
                        statusEl.innerHTML = '<span style="color:#ff5555;">🔒 尚未解鎖</span>';
                    } else {
                        statusEl.innerHTML = '<span style="color:#55ff55;">🔓 已解鎖</span>';
                    }
                    
                    let scenarioHtml = '📜 關聯劇本：<br>';
                    if (Array.isArray(data.scenario) && data.scenario.length > 0) {
                        scenarioHtml += data.scenario.map(s => `．${s}`).join('<br>');
                    } else if (data.scenario) {
                        scenarioHtml += `．${data.scenario}`;
                    } else {
                        scenarioHtml = '📜 關聯劇本：未指定';
                    }
                    document.getElementById('tt-scenario').innerHTML = scenarioHtml;
                    
                    document.getElementById('tt-team').innerText = `🚩 首勘隊伍：${data.firstTeam || '尚未有人踏足'}`;
                }

                tooltip.classList.add('show');
                updateTooltipPosition(e);
            });

            element.addEventListener('mousemove', updateTooltipPosition);
            element.addEventListener('mouseleave', () => { tooltip.classList.remove('show'); });
        }

        function updateTooltipPosition(e) {
            const tt = document.getElementById('hover-tooltip');
            let x = e.clientX + 20; let y = e.clientY + 20;
            if (x + 300 > window.innerWidth) x = e.clientX - 320;
            if (y + 180 > window.innerHeight) y = e.clientY - 180;
            tt.style.left = x + 'px'; tt.style.top = y + 'px';
        }

        // ==========================================
        // 3. 自動磁吸縫合引擎 
        // ==========================================
        function autoSnapPolygons(worldData) {
            let points = [];
            
            for (let key in worldData) {
                if(worldData[key].polygon) {
                    const polygonParts = worldData[key].polygon.split(';');
                    worldData[key].pointsGroup = polygonParts.map(part => {
                        return part.trim().split(/\s+/).map((p, idx) => {
                            let [x, y] = p.split(',').map(Number);
                            return { key, idx, x, y, isArchipelago: worldData[key].isArchipelago };
                        });
                    });
                    worldData[key].pointsGroup.flat().forEach(pt => points.push(pt));
                }
            }

            for (let i = 0; i < points.length; i++) {
                if (points[i].snapped) continue;
                
                let cluster = [points[i]];
                for (let j = i + 1; j < points.length; j++) {
                    if (points[j].snapped) continue;
                    if (points[i].key === points[j].key && Math.abs(points[i].idx - points[j].idx) <= 2) continue;

                    if (Math.hypot(points[i].x - points[j].x, points[i].y - points[j].y) <= 12) {
                        cluster.push(points[j]);
                    }
                }

                if (cluster.length > 1) {
                    let avgX = Math.round(cluster.reduce((sum, p) => sum + p.x, 0) / cluster.length);
                    let avgY = Math.round(cluster.reduce((sum, p) => sum + p.y, 0) / cluster.length);
                    cluster.forEach(p => { p.x = avgX; p.y = avgY; p.snapped = true; });
                }
                points[i].snapped = true;
            }

            for (let key in worldData) {
                if(worldData[key].pointsGroup) {
                    worldData[key].polygon = worldData[key].pointsGroup.map(group => {
                        return group.map(p => `${p.x},${p.y}`).join(' ');
                    }).join('; ');
                }
            }
        }

        function initWorldHotspots() {
            autoSnapPolygons(worldData);
            compileGlobalData(); 

            const layer = document.getElementById('layer-world');
            layer.innerHTML = ''; 

            const img = document.getElementById('main-map-img');
            const mapHeight = img.offsetHeight || 900; 

            const svgNS = "http://www.w3.org/2000/svg";
            const svg = document.createElementNS(svgNS, "svg");
            
            svg.setAttribute("viewBox", `0 0 1500 ${mapHeight}`);
            svg.setAttribute("preserveAspectRatio", "none");
            svg.style.width = "100%";
            svg.style.height = "100%";
            svg.style.position = "absolute";
            svg.style.pointerEvents = "none";

            const sortedKeys = Object.keys(worldData).sort((a, b) => {
                const isA_Water = ['azul_sea', 'kuarte_bay', 'kultaka_bay', 'kodel_bay', 'maztapan', 'greensisters', 'coxamult', 'brownsisters'].includes(a);
                const isB_Water = ['azul_sea', 'kuarte_bay', 'kultaka_bay', 'kodel_bay', 'maztapan', 'greensisters', 'coxamult', 'brownsisters'].includes(b);
                return isA_Water ? -1 : (isB_Water ? 1 : 0);
            });

            for (const key of sortedKeys) {
                const data = worldData[key];
                if (!data.polygon) continue;

                const polygonParts = data.polygon.split(';');

                polygonParts.forEach(part => {
                    const poly = document.createElementNS(svgNS, "polygon");
                    poly.setAttribute("points", part.trim());
                    
                    const isWater = ['azul_sea', 'kuarte_bay', 'kultaka_bay', 'kodel_bay'].includes(key);
                    const isArch = data.isArchipelago;

                    poly.setAttribute("class", `map-region-polygon ${data.isLocked ? 'locked' : ''} ${isWater ? 'ocean' : ''} ${isArch ? 'archipelago' : ''}`);
                    
                    poly.style.fill = data.bgColor || 'rgba(212, 175, 55, 0.2)';
                    poly.style.stroke = data.color || '#d4af37';
                    poly.style.color = data.color || '#d4af37'; 

                    const regionType = isWater ? 'ocean' : (isArch ? 'archipelago' : 'region');
                    attachTooltipEvents(poly, data, regionType);
                    poly.onclick = () => { 
                        if(!data.isLocked && regionType === 'region') focusRegion(key); 
                    };
                    
                    svg.appendChild(poly);
                });

                if (data.labelPos) {
                    const text = document.createElementNS(svgNS, "text");
                    text.setAttribute("x", data.labelPos.x);
                    text.setAttribute("y", data.labelPos.y);
                    text.setAttribute("fill", data.color || '#d4af37');
                    text.setAttribute("class", `region-svg-text region-label-nodes ${data.isLocked ? 'locked-text' : ''}`);
                    text.textContent = data.name;
                    svg.appendChild(text);
                }
            }
            
            layer.appendChild(svg);
            
            globalLayerElement = document.getElementById('layer-region');
            renderSeamlessGlobalLandmarks(); 
        }

        function renderSeamlessGlobalLandmarks() {
            if (!globalLayerElement) return;
            globalLayerElement.innerHTML = '';

            // 1. 自然景點
            ALL_SPOTS.forEach(spot => {
                const spotTag = document.createElement('div');
                spotTag.className = `local-spot-tag spot-${spot.type}`;
                spotTag.style.left = spot.x;
                spotTag.style.top = spot.y;
                spotTag.innerText = spot.name;
                attachTooltipEvents(spotTag, spot, 'spot');
                globalLayerElement.appendChild(spotTag);
            });

            // 2. 城鎮圖釘
            ALL_LOCATIONS.forEach(loc => {
                const pin = document.createElement('div');
                pin.className = 'map-pin';
                if (loc.isLocked) pin.classList.add('locked');

                pin.style.left = loc.x;
                pin.style.top = loc.y;
                pin.innerHTML = getAztecPinSVG(loc.color || '#d4af37', loc.gem || '#1a1511');
                
                attachTooltipEvents(pin, loc, 'location');

                pin.onclick = (e) => {
                    e.stopPropagation(); 
                    if (!loc.isLocked) showDetail(loc);
                };
                globalLayerElement.appendChild(pin);
            });
        }

        // ==========================================
        // 4. 彈窗控制 (Modal)
        // ==========================================
        function showDetail(locData) {
            document.getElementById('hover-tooltip').classList.remove('show');
            const modal = document.getElementById('location-modal');
            document.getElementById('modal-title').innerText = locData.name;
            const iframe = document.getElementById('modal-iframe');
            const simple = document.getElementById('modal-simple-content');
            
            if (locData.url) {
                simple.style.display = 'none';
                iframe.style.display = 'block';
                iframe.src = "locations/" + locData.url;
            } else {
                iframe.style.display = 'none';
                iframe.src = ""; 
                simple.style.display = 'block';
                simple.innerHTML = `
                    <h2 style="font-family:'Cinzel', 'Noto Serif TC', serif; color:var(--gold); border-bottom:1px solid #555; padding-bottom:10px;">${locData.name}</h2>
                    <p style="font-size: 1.25rem; line-height: 1.8; color: #ccc;">${locData.desc || locData.brief || '這片區域尚待勇敢的冒險者前來探索。'}</p>
                `;
            }
            // 🌟 核心修正：徹底移除會阻斷整個 JS 腳本並造成網頁卡死崩潰的無效方法 modal.add('show')；
            modal.classList.add('show');
        }

        // ==========================================
        // 5. 地圖控制器
        // ==========================================
        const MapController = {
            scale: 1, pointX: 0, pointY: 0,
            container: document.getElementById('map-container'),
            viewport: document.getElementById('viewport'),
            img: document.getElementById('main-map-img'),
            isAnimating: false,

            init() {
                let isDragging = false;
                let startX = 0, startY = 0;

                this.viewport.addEventListener('wheel', (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    if(this.isAnimating) return;
                    
                    const delta = -e.deltaY;
                    (delta > 0) ? (this.scale *= 1.1) : (this.scale /= 1.1);
                    this.scale = Math.min(Math.max(1, this.scale), 6);
                    this.updateTransform();
                }, { passive: false });

                this.viewport.addEventListener('mousedown', (e) => {
                    if(this.isAnimating) return;
                    e.preventDefault();
                    isDragging = true;
                    startX = e.clientX - this.pointX;
                    startY = e.clientY - this.pointY;
                    this.viewport.style.cursor = 'grabbing';
                    this.container.style.transition = 'none';
                    window.focus(); 
                });

                this.viewport.addEventListener('mousemove', (e) => {
                    if (!isDragging) return;
                    e.preventDefault();
                    this.pointX = e.clientX - startX;
                    this.pointY = e.clientY - startY;
                    this.updateTransform();
                });

                this.viewport.addEventListener('mouseup', () => { isDragging = false; this.viewport.style.cursor = 'grab'; });
                this.viewport.addEventListener('mouseleave', () => { isDragging = false; this.viewport.style.cursor = 'grab'; });

                if (this.img.complete) {
                    this.resetView(); initWorldHotspots();
                } else {
                    this.img.onload = () => { this.resetView(); initWorldHotspots(); };
                }
            },

            updateTransform() {
                const vw = this.viewport.clientWidth; const vh = this.viewport.clientHeight;
                const iw = this.img.width || 1500; const ih = this.img.height || (iw * 0.6); 

                const minScale = Math.max(vw / iw, vh / ih);
                const safeMinScale = isFinite(minScale) ? minScale : 1;
                if (this.scale < safeMinScale) this.scale = safeMinScale;

                const curW = iw * this.scale; const curH = ih * this.scale;
                const minX = vw - curW, maxX = 0; const minY = vh - curH, maxY = 0;

                if (this.pointX > maxX) this.pointX = maxX;
                if (this.pointX < minX) this.pointX = minX;
                if (this.pointY > maxY) this.pointY = maxY;
                if (this.pointY < minY) this.pointY = minY;

                this.container.style.transform = `translate(${this.pointX}px, ${this.pointY}px) scale(${this.scale})`;

                const regionLayer = document.getElementById('layer-region');
                const regionLabels = document.querySelectorAll('.region-label-nodes');

                if (this.scale >= 1.75 || currentRegionKey !== null) {
                    if (regionLayer) {
                        regionLayer.style.opacity = 1;
                        regionLayer.style.pointerEvents = 'auto';
                    }
                    regionLabels.forEach(lbl => lbl.style.opacity = 0);
                } else {
                    if (regionLayer) {
                        regionLayer.style.opacity = 0;
                        regionLayer.style.pointerEvents = 'none';
                    }
                    regionLabels.forEach(lbl => lbl.style.opacity = 1);
                }
            },

            flyTo(xPercent, yPercent, targetZoom) {
                this.isAnimating = true;
                this.container.style.transition = 'transform 1.5s cubic-bezier(0.25, 1, 0.5, 1)';
                
                const iw = this.img.width || 1500; const ih = this.img.height || (iw * 0.6);
                const targetX = (xPercent / 100) * iw; const targetY = (yPercent / 100) * ih;
                
                this.scale = targetZoom;
                const vw = this.viewport.clientWidth; const vh = this.viewport.clientHeight;
                
                this.pointX = (vw / 2) - (targetX * this.scale);
                this.pointY = (vh / 2) - (targetY * this.scale);
                
                this.updateTransform();
                setTimeout(() => { this.isAnimating = false; this.container.style.transition = 'none'; }, 1500);
            },

            resetView() {
                this.isAnimating = true;
                this.container.style.transition = 'transform 1.2s ease';
                
                const vw = this.viewport.clientWidth; 
                const vh = this.viewport.clientHeight;
                const iw = this.img.width || 1500; 
                const ih = this.img.height || (iw * 0.6);
                
                const scaleModifier = 1.0; 
                const minScale = Math.max(vw / iw, vh / ih);
                this.scale = isFinite(minScale) ? minScale * scaleModifier : scaleModifier; 
                
                const curW = iw * this.scale;
                this.pointX = (vw - curW) / 2; 
                
                const yOffset = -400; 
                this.pointY = yOffset; 
                
                this.updateTransform();
                setTimeout(() => { this.isAnimating = false; this.container.style.transition = 'none'; }, 1200);
            }
        };
        MapController.init();

        // ==========================================
        // 6. 邏輯控制與區域聚焦
        // ==========================================
        let currentRegionKey = null;

        function focusRegion(regionKey) {
            const data = worldData[regionKey];
            if (!data) return;
            currentRegionKey = regionKey;

            document.getElementById('hover-tooltip').classList.remove('show');
            const targetedZoom = Math.max(data.focus.zoom, 2.2);
            MapController.flyTo(data.focus.x, data.focus.y, targetedZoom);

            document.getElementById('header-title').innerText = `巡航模式：${data.name}`;
            document.getElementById('header-btn').innerText = "↑ 返回世界地圖";

            // 🌟 核心修正：降低透明度的同時，必須「釋放」滑鼠穿透（pointer-events: none），否則這層隱形的 SVG 區塊會擋在最前面，把所有小圖釘的點擊事件全部吃掉！
            const layerWorld = document.getElementById('layer-world');
            layerWorld.style.opacity = 0.25;
            layerWorld.style.pointerEvents = 'none';
            
            MapController.updateTransform();
        }

        // 🌟 獨立入口控制函數：杜絕所有與 data focus 互相覆蓋的 JavaScript 死循環
        function handleHeaderNavClick() {
            closeModal(); 
            document.getElementById('hover-tooltip').classList.remove('show');

            if (currentRegionKey !== null) {
                // 如果目前在區域拉近狀態，先縮回世界圖視角
                currentRegionKey = null;
                MapController.resetView();
                
                document.getElementById('header-title').innerText = "馬茲提卡大陸全圖";
                document.getElementById('header-btn').innerText = "← 返回公會書房";
                
                // 🌟 還原：世界不規則 SVG 區塊重現並回復點擊捕獲能力
                const layerWorld = document.getElementById('layer-world');
                layerWorld.style.opacity = 1;
                layerWorld.style.pointerEvents = 'auto';
                
                MapController.updateTransform();
            } else {
                // 如果已經在世界全景，安全且不卡快取地打破 iframe 限制跳轉
                window.top.location.href = '../index.html';
            }
        }
    </script>
</body>
